x-api-gateway: &api-gateway
  build:
    context: ../services/api-gateway
  environment:
    PORT: 3000
    JWT_SECRET: dev-secret
    USER_SERVICE_URL: http://user-service:3001
    ORDER_SERVICE_URL: http://order-service:3002
    PAYMENT_SERVICE_URL: http://payment-service:3003
  depends_on:
    - user-service
    - order-service
    - payment-service

services:
  api-gateway-1:
    <<: *api-gateway
    ports:
      - "3000:3000"

  api-gateway-2:
    <<: *api-gateway

  api-gateway-3:
    <<: *api-gateway

  user-service:
    build:
      context: ../services/user-service
    ports:
      - "3001:3001"

  order-service:
    build:
      context: ../services/order-service
    ports:
      - "3002:3002"

  payment-service:
    build:
      context: ../services/payment-service
    ports:
      - "3003:3003"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway-1
      - api-gateway-2
      - api-gateway-3
